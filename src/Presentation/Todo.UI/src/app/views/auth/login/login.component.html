<div class="min-vh-100 d-flex align-items-center justify-content-center bg-body-secondary">
  <div class="card shadow-lg" style="width: 100%; max-width: 420px;">
    <div class="card-body p-5">

      <div class="text-center mb-4">
        <span class="badge bg-primary fs-5 px-3 py-2 mb-3 d-inline-block">ICA</span>
        <h2 class="fw-bold mb-1">Welcome Back</h2>
        <p class="text-muted mb-0">ICA Employee Portal</p>
      </div>

      <div class="alert alert-danger d-flex align-items-center gap-2" *ngIf="errorMessage">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span>{{ errorMessage }}</span>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

        <div class="mb-3">
          <label for="email" class="form-label fw-semibold">Email Address</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            class="form-control"
            [class.is-invalid]="email.invalid && email.touched"
            placeholder="you@icagroup.in"
            autocomplete="email"
          />
          <div class="invalid-feedback">
            <span *ngIf="email.errors?.['required']">Email is required.</span>
            <span *ngIf="email.errors?.['email']">Please enter a valid email address.</span>
          </div>
        </div>

        <div class="mb-4">
          <label for="password" class="form-label fw-semibold">Password</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            class="form-control"
            [class.is-invalid]="password.invalid && password.touched"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
          <div class="invalid-feedback">
            <span *ngIf="password.errors?.['required']">Password is required.</span>
          </div>
        </div>

        <button
          type="submit"
          class="btn btn-primary w-100 py-2"
          [disabled]="isLoading || loginForm.invalid"
        >
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status"></span>
          {{ isLoading ? 'Signing in...' : 'Sign In' }}
        </button>

      </form>

      <hr class="my-4" />
      <p class="text-center mb-0 small">
        Don't have an account?
        <a routerLink="/auth/register" class="text-primary fw-semibold">Register here</a>
      </p>
    </div>
  </div>
</div>
