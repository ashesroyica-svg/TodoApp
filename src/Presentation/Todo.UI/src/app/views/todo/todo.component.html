<app-navbar></app-navbar>

<main class="container py-4">

  <!-- Global error alert -->
  <div class="alert alert-danger alert-dismissible d-flex align-items-center gap-2" *ngIf="errorMessage">
    <i class="bi bi-exclamation-triangle-fill"></i>
    <span>{{ errorMessage }}</span>
    <button type="button" class="btn-close ms-auto" (click)="errorMessage = ''"></button>
  </div>

  <!-- ── Add Task Card ─────────────────────────────────────────── -->
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h5 class="card-title fw-semibold mb-3">
        <i class="bi bi-plus-circle me-2 text-primary"></i>Add New Task
      </h5>
      <div class="input-group">
        <input
          type="text"
          [formControl]="taskControl"
          placeholder="What needs to be done?"
          class="form-control form-control-lg"
          [class.is-invalid]="!!taskError"
          (keydown.enter)="addTask()"
        />
        <button class="btn btn-primary px-4" (click)="addTask()">
          <i class="bi bi-plus-lg me-1"></i>Add
        </button>
      </div>
      <div class="text-danger small mt-1" *ngIf="taskError">
        <i class="bi bi-exclamation-circle me-1"></i>{{ taskError }}
      </div>
    </div>
  </div>

  <!-- ── Search Bar ────────────────────────────────────────────── -->
  <div class="mb-4">
    <div class="input-group">
      <span class="input-group-text bg-transparent">
        <i class="bi bi-search text-muted"></i>
      </span>
      <input
        type="text"
        [formControl]="searchControl"
        placeholder="Search tasks..."
        class="form-control"
      />
      <button
        class="btn btn-outline-secondary"
        *ngIf="searchControl.value"
        (click)="searchControl.setValue('')"
        title="Clear search"
      >
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
  </div>

  <!-- ── Stats Row ─────────────────────────────────────────────── -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <small class="text-muted">
      <i class="bi bi-list-task me-1"></i>{{ totalCount() }} task(s)
    </small>
    <small class="text-muted" *ngIf="totalPages() > 1">
      Page {{ currentPage() }} of {{ totalPages() }}
    </small>
  </div>

  <!-- ── Task Cards ─────────────────────────────────────────────── -->
  <div *ngFor="let task of tasks()">
    <div
      class="card shadow-sm mb-2"
      [class.border-success]="task.isCompleted"
      [class.opacity-75]="task.isCompleted"
    >
      <div class="card-body d-flex align-items-center gap-3 py-2 px-3">
        <input
          type="checkbox"
          class="form-check-input flex-shrink-0 mt-0"
          style="width: 1.25em; height: 1.25em; cursor: pointer;"
          [checked]="task.isCompleted"
          (change)="toggleStatus(task)"
          [title]="task.isCompleted ? 'Mark as incomplete' : 'Mark as complete'"
        />
        <span
          class="flex-grow-1"
          [class.text-decoration-line-through]="task.isCompleted"
          [class.text-danger]="task.isCompleted"
        >
          {{ task.task }}
        </span>
        <small class="text-muted d-none d-md-block flex-shrink-0">
          {{ task.createdDate | date:'MMM d, y' }}
        </small>
        <button
          class="btn btn-outline-danger btn-sm flex-shrink-0"
          (click)="deleteTask(task.id)"
          title="Delete task"
        >
          <i class="bi bi-trash"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- ── Empty State ───────────────────────────────────────────── -->
  <div class="text-center py-5" *ngIf="tasks().length === 0">
    <i class="bi bi-clipboard-check display-3 text-muted"></i>
    <p class="text-muted mt-3 mb-0 fs-5">No tasks found.</p>
    <p class="text-muted small">Use the form above to add your first task!</p>
  </div>

  <!-- ── Pagination ────────────────────────────────────────────── -->
  <nav class="mt-4" *ngIf="totalPages() > 1" aria-label="Task pagination">
    <ul class="pagination justify-content-center">
      <li class="page-item" [class.disabled]="currentPage() === 1">
        <button class="page-link" (click)="goToPage(currentPage() - 1)" [disabled]="currentPage() === 1">
          <i class="bi bi-chevron-left"></i>
        </button>
      </li>
      <li
        *ngFor="let page of pageNumbers()"
        class="page-item"
        [class.active]="page === currentPage()"
      >
        <button class="page-link" (click)="goToPage(page)">{{ page }}</button>
      </li>
      <li class="page-item" [class.disabled]="currentPage() === totalPages()">
        <button class="page-link" (click)="goToPage(currentPage() + 1)" [disabled]="currentPage() === totalPages()">
          <i class="bi bi-chevron-right"></i>
        </button>
      </li>
    </ul>
  </nav>

</main>
