<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="#">
      <span class="badge bg-white text-primary fw-bold fs-6 px-2 py-1">ICA</span>
      <span class="fw-semibold fs-5">Todo</span>
    </a>

    <div class="d-flex align-items-center gap-2 me-auto ms-3">
      <a routerLink="/dashboard" routerLinkActive="active"
         class="btn btn-sm text-white nav-link-btn">
        <i class="bi bi-speedometer2 me-1"></i>
        <span class="d-none d-sm-inline">Dashboard</span>
      </a>
      <a routerLink="/todo" routerLinkActive="active"
         class="btn btn-sm text-white nav-link-btn">
        <i class="bi bi-list-task me-1"></i>
        <span class="d-none d-sm-inline">My Tasks</span>
      </a>
    </div>

    <div class="d-flex align-items-center gap-2">
      <span class="text-white-50 d-none d-sm-inline small me-1">
        <i class="bi bi-person-circle me-1"></i>{{ username }}
      </span>

      <button
        class="btn btn-outline-light btn-sm"
        (click)="toggleTheme()"
        [title]="themeService.isDark() ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
      >
        <i [class]="themeService.isDark() ? 'bi bi-sun-fill' : 'bi bi-moon-fill'"></i>
      </button>

      <button class="btn btn-outline-light btn-sm" (click)="logout()">
        <i class="bi bi-box-arrow-right me-1"></i>
        <span class="d-none d-sm-inline">Logout</span>
      </button>
    </div>
  </div>
</nav>
